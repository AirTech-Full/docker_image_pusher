name: Docker Image Mirror (skopeo)

on:
  workflow_dispatch:
    inputs:
      full_sync:
        description: '全量同步所有镜像（忽略增量检测）'
        required: false
        type: boolean
        default: false
  push:
    branches: [ main ]

env:
  ALIYUN_REGISTRY: "${{ secrets.ALIYUN_REGISTRY }}"
  ALIYUN_NAME_SPACE: "${{ secrets.ALIYUN_NAME_SPACE }}"
  ALIYUN_REGISTRY_USER: "${{ secrets.ALIYUN_REGISTRY_USER }}"
  ALIYUN_REGISTRY_PASSWORD: "${{ secrets.ALIYUN_REGISTRY_PASSWORD }}"

jobs:
  mirror:
    name: Mirror Images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Install skopeo
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq skopeo

      - name: Determine changed images
        id: diff
        run: |
          FULL_SYNC="${{ github.event.inputs.full_sync || 'false' }}"

          if [ "$FULL_SYNC" = "true" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "🔁 全量同步模式"
            grep -v '^\s*$\|^\s*#' images.txt > /tmp/to_sync.txt || true
          else
            echo "📌 增量同步模式（仅处理本次变更的镜像）"
            git diff HEAD~1 -- images.txt | grep '^\+[^+]' | sed 's/^+//' | grep -v '^\s*$\|^\s*#' > /tmp/to_sync.txt || true

            if [ ! -s /tmp/to_sync.txt ]; then
              echo "⚠️ images.txt 无变更，跳过同步"
              echo "skipped=true" >> $GITHUB_OUTPUT
              exit 0
            fi
          fi

          echo "skipped=false" >> $GITHUB_OUTPUT
          echo "📋 待同步镜像:"
          cat /tmp/to_sync.txt

      - name: Login to Aliyun Registry
        if: steps.diff.outputs.skipped != 'true'
        run: |
          echo "$ALIYUN_REGISTRY_PASSWORD" | skopeo login -u "$ALIYUN_REGISTRY_USER" --password-stdin "$ALIYUN_REGISTRY"
          skopeo login -u "$ALIYUN_REGISTRY_USER" -p "$ALIYUN_REGISTRY_PASSWORD" "$ALIYUN_REGISTRY"

      - name: Mirror Images
        id: mirror
        if: steps.diff.outputs.skipped != 'true'
        run: |
          set -o pipefail

          declare -A duplicate_images
          declare -A temp_map

          while IFS= read -r line || [ -n "$line" ]; do
            [[ -z "$line" ]] && continue
            [[ "$line" =~ ^[[:space:]]*# ]] && continue

            image=$(echo "$line" | awk '{print $NF}')
            image="${image%%@*}"
            image_name_tag=$(echo "$image" | awk -F'/' '{print $NF}')
            name_space=$(echo "$image" | awk -F'/' '{if (NF==3) print $2; else if (NF==2) print $1; else print ""}')
            name_space="${name_space}_"
            image_name=$(echo "$image_name_tag" | awk -F':' '{print $1}')

            if [[ -n "${temp_map[$image_name]}" ]]; then
              if [[ "${temp_map[$image_name]}" != "$name_space" ]]; then
                duplicate_images[$image_name]="true"
              fi
            else
              temp_map[$image_name]=$name_space
            fi
          done < /tmp/to_sync.txt

          total=0
          success=0
          failed=0
          echo "" > /tmp/results.md

          while IFS= read -r line || [ -n "$line" ]; do
            [[ -z "$line" ]] && continue
            [[ "$line" =~ ^[[:space:]]*# ]] && continue

            total=$((total + 1))

            platform=$(echo "$line" | grep -oP '(?<=--platform[= ])\S+' || echo "")
            if [ -n "$platform" ]; then
              platform_prefix="${platform//\//_}_"
            else
              platform_prefix=""
            fi

            image=$(echo "$line" | awk '{print $NF}')
            image_name_tag=$(echo "$image" | awk -F'/' '{print $NF}')
            image_name_tag="${image_name_tag%%@*}"
            name_space=$(echo "$image" | awk -F'/' '{if (NF==3) print $2; else if (NF==2) print $1; else print ""}')
            image_name=$(echo "$image_name_tag" | awk -F':' '{print $1}')

            name_space_prefix=""
            if [[ -n "${duplicate_images[$image_name]}" && -n "$name_space" ]]; then
              name_space_prefix="${name_space}_"
            fi

            if [[ "$image" != */* ]]; then
              src_image="docker.io/library/$image"
            elif [[ "$image" != *.*/* && "$image" != *:*/* ]]; then
              src_image="docker.io/$image"
            else
              src_image="$image"
            fi

            target="$ALIYUN_REGISTRY/$ALIYUN_NAME_SPACE/${platform_prefix}${name_space_prefix}${image_name_tag}"

            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "[$total] $src_image → $target"

            attempt=1
            max_attempts=3
            copied=false

            while [ $attempt -le $max_attempts ]; do
              echo "  尝试 $attempt/$max_attempts ..."
              if skopeo copy --preserve-digests "docker://$src_image" "docker://$target" 2>&1; then
                echo "  ✅ 成功"
                success=$((success + 1))
                echo "| ✅ | \`$src_image\` | \`$target\` |" >> /tmp/results.md
                copied=true
                break
              else
                echo "  ⚠️ 失败"
                if [ $attempt -lt $max_attempts ]; then
                  sleep $((attempt * 10))
                fi
              fi
              attempt=$((attempt + 1))
            done

            if [ "$copied" = false ]; then
              failed=$((failed + 1))
              echo "  ❌ 最终失败"
              echo "| ❌ | \`$src_image\` | \`$target\` |" >> /tmp/results.md
            fi

          done < /tmp/to_sync.txt

          echo ""
          echo "════════════════════════════════════════════════════════"
          echo "  总计: $total  |  ✅ 成功: $success  |  ❌ 失败: $failed"
          echo "════════════════════════════════════════════════════════"

          echo "total=$total" >> $GITHUB_OUTPUT
          echo "success=$success" >> $GITHUB_OUTPUT
          echo "failed=$failed" >> $GITHUB_OUTPUT

          cp /tmp/to_sync.txt /tmp/synced_images.txt

          if [ $failed -gt 0 ]; then
            exit 1
          fi

      - name: Build postgis-vector images
        id: postgis_vector
        if: steps.diff.outputs.skipped != 'true' && steps.mirror.outcome == 'success'
        run: |
          set -o pipefail

          echo "" > /tmp/postgis_results.md
          pg_built=0
          pg_failed=0

          while IFS= read -r line || [ -n "$line" ]; do
            [[ -z "$line" ]] && continue
            [[ "$line" =~ ^[[:space:]]*# ]] && continue

            image=$(echo "$line" | awk '{print $NF}')
            image="${image%%@*}"

            case "$image" in
              *postgis*|*postgres*postgis*) ;;
              *) continue ;;
            esac

            image_name_tag=$(echo "$image" | awk -F'/' '{print $NF}')
            tag="${image_name_tag#*:}"
            [ -z "$tag" ] && tag="latest"

            if [[ "$image" != */* ]]; then
              src_image="docker.io/library/$image"
            elif [[ "$image" != *.*/* && "$image" != *:*/* ]]; then
              src_image="docker.io/$image"
            else
              src_image="$image"
            fi

            target_image="${ALIYUN_REGISTRY}/${ALIYUN_NAME_SPACE}/postgis-vector:${tag}"

            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "🐘 检测到 PostGIS 镜像: $src_image"
            echo "🔧 构建 postgis-vector:${tag}（PostGIS + pgvector）"

            cp Dockerfile.postgis-vector /tmp/Dockerfile.pgv
            sed -i "s|__SRC_IMAGE__|${src_image}|g" /tmp/Dockerfile.pgv

            echo "📄 Dockerfile:"
            cat /tmp/Dockerfile.pgv

            echo "🏗️  构建中..."
            if docker build -t "$target_image" -f /tmp/Dockerfile.pgv . 2>&1; then
              echo "✅ 构建成功"
            else
              echo "❌ 构建失败"
              pg_failed=$((pg_failed + 1))
              echo "| ❌ | \`postgis-vector:${tag}\` | 构建失败 |" >> /tmp/postgis_results.md
              continue
            fi

            echo "📤 推送到阿里云..."
            echo "$ALIYUN_REGISTRY_PASSWORD" | docker login -u "$ALIYUN_REGISTRY_USER" --password-stdin "$ALIYUN_REGISTRY"

            if docker push "$target_image" 2>&1; then
              echo "✅ 推送成功: $target_image"
              pg_built=$((pg_built + 1))
              echo "| ✅ | \`postgis-vector:${tag}\` | \`$target_image\` |" >> /tmp/postgis_results.md
            else
              echo "❌ 推送失败"
              pg_failed=$((pg_failed + 1))
              echo "| ❌ | \`postgis-vector:${tag}\` | 推送失败 |" >> /tmp/postgis_results.md
            fi

          done < /tmp/synced_images.txt

          echo "pg_built=$pg_built" >> $GITHUB_OUTPUT
          echo "pg_failed=$pg_failed" >> $GITHUB_OUTPUT

      - name: Summary
        if: always() && steps.diff.outputs.skipped != 'true'
        run: |
          {
            echo "## 📦 镜像同步结果"
            echo ""
            echo "| 状态 | 源镜像 | 目标镜像 |"
            echo "|------|--------|----------|"
            cat /tmp/results.md 2>/dev/null || true
            echo ""
            echo "**总计:** ${{ steps.mirror.outputs.total || 0 }} | **✅ 成功:** ${{ steps.mirror.outputs.success || 0 }} | **❌ 失败:** ${{ steps.mirror.outputs.failed || 0 }}"
            if [ -n "${{ steps.postgis_vector.outputs.pg_built || '' }}${{ steps.postgis_vector.outputs.pg_failed || '' }}" ]; then
              echo ""
              echo "## 🐘 postgis-vector 构建结果"
              echo ""
              echo "| 状态 | 镜像 | 目标 |"
              echo "|------|------|------|"
              cat /tmp/postgis_results.md 2>/dev/null || true
              echo ""
              echo "**✅ 构建成功:** ${{ steps.postgis_vector.outputs.pg_built || 0 }} | **❌ 构建失败:** ${{ steps.postgis_vector.outputs.pg_failed || 0 }}"
            fi
          } >> $GITHUB_STEP_SUMMARY

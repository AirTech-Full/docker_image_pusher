name: Docker Image Mirror (skopeo)

on:
  workflow_dispatch:
    inputs:
      full_sync:
        description: '全量同步所有镜像（忽略增量检测）'
        required: false
        type: boolean
        default: false
  push:
    branches: [ main ]

env:
  ALIYUN_REGISTRY: "${{ secrets.ALIYUN_REGISTRY }}"
  ALIYUN_NAME_SPACE: "${{ secrets.ALIYUN_NAME_SPACE }}"
  ALIYUN_REGISTRY_USER: "${{ secrets.ALIYUN_REGISTRY_USER }}"
  ALIYUN_REGISTRY_PASSWORD: "${{ secrets.ALIYUN_REGISTRY_PASSWORD }}"

jobs:
  mirror:
    name: Mirror Images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # 需要 git diff HEAD~1

      - name: Install skopeo
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq skopeo

      - name: Determine changed images
        id: diff
        run: |
          FULL_SYNC="${{ github.event.inputs.full_sync || 'false' }}"

          if [ "$FULL_SYNC" = "true" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "🔁 全量同步模式"
            grep -v '^\s*$\|^\s*#' images.txt > /tmp/to_sync.txt || true
          else
            echo "📌 增量同步模式（仅处理本次变更的镜像）"
            # 获取本次 diff 中 images.txt 新增/修改的行
            git diff HEAD~1 -- images.txt | grep '^\+[^+]' | sed 's/^+//' | grep -v '^\s*$\|^\s*#' > /tmp/to_sync.txt || true

            if [ ! -s /tmp/to_sync.txt ]; then
              echo "⚠️ images.txt 无变更，跳过同步"
              echo "skipped=true" >> $GITHUB_OUTPUT
              exit 0
            fi
          fi

          echo "skipped=false" >> $GITHUB_OUTPUT
          echo "📋 待同步镜像:"
          cat /tmp/to_sync.txt

      - name: Login to Aliyun Registry
        if: steps.diff.outputs.skipped != 'true'
        run: |
          echo "$ALIYUN_REGISTRY_PASSWORD" | skopeo login -u "$ALIYUN_REGISTRY_USER" --password-stdin "$ALIYUN_REGISTRY"
          # 同时登录 Docker Hub（匿名即可，skopeo 需要）
          skopeo login -u "$ALIYUN_REGISTRY_USER" -p "$ALIYUN_REGISTRY_PASSWORD" "$ALIYUN_REGISTRY"

      - name: Mirror Images
        id: mirror
        if: steps.diff.outputs.skipped != 'true'
        run: |
          set -o pipefail

          # 预处理：镜像重名检测
          declare -A duplicate_images
          declare -A temp_map

          while IFS= read -r line || [ -n "$line" ]; do
            [[ -z "$line" ]] && continue
            [[ "$line" =~ ^[[:space:]]*# ]] && continue

            image=$(echo "$line" | awk '{print $NF}')
            image="${image%%@*}"
            image_name_tag=$(echo "$image" | awk -F'/' '{print $NF}')
            name_space=$(echo "$image" | awk -F'/' '{if (NF==3) print $2; else if (NF==2) print $1; else print ""}')
            name_space="${name_space}_"
            image_name=$(echo "$image_name_tag" | awk -F':' '{print $1}')

            if [[ -n "${temp_map[$image_name]}" ]]; then
              if [[ "${temp_map[$image_name]}" != "$name_space" ]]; then
                duplicate_images[$image_name]="true"
              fi
            else
              temp_map[$image_name]=$name_space
            fi
          done < /tmp/to_sync.txt

          # 核心同步循环
          total=0
          success=0
          failed=0
          echo "" > /tmp/results.md

          while IFS= read -r line || [ -n "$line" ]; do
            [[ -z "$line" ]] && continue
            [[ "$line" =~ ^[[:space:]]*# ]] && continue

            total=$((total + 1))

            # ---------- 解析 ----------
            # 提取 --platform（如果有）
            platform=$(echo "$line" | grep -oP '(?<=--platform[= ])\S+' || echo "")
            if [ -n "$platform" ]; then
              platform_prefix="${platform//\//_}_"
            else
              platform_prefix=""
            fi

            image=$(echo "$line" | awk '{print $NF}')
            image_name_tag=$(echo "$image" | awk -F'/' '{print $NF}')
            image_name_tag="${image_name_tag%%@*}"
            name_space=$(echo "$image" | awk -F'/' '{if (NF==3) print $2; else if (NF==2) print $1; else print ""}')
            image_name=$(echo "$image_name_tag" | awk -F':' '{print $1}')

            # 重名前缀
            name_space_prefix=""
            if [[ -n "${duplicate_images[$image_name]}" && -n "$name_space" ]]; then
              name_space_prefix="${name_space}_"
            fi

            # 补全官方镜像路径
            if [[ "$image" != */* ]]; then
              src_image="docker.io/library/$image"
            elif [[ "$image" != *.*/* && "$image" != *:*/* ]]; then
              src_image="docker.io/$image"
            else
              src_image="$image"
            fi

            target="$ALIYUN_REGISTRY/$ALIYUN_NAME_SPACE/${platform_prefix}${name_space_prefix}${image_name_tag}"

            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "[$total] $src_image → $target"

            # ---------- skopeo copy with retry ----------
            attempt=1
            max_attempts=3
            copied=false

            while [ $attempt -le $max_attempts ]; do
              echo "  尝试 $attempt/$max_attempts ..."
              if skopeo copy --preserve-digests \
                   "docker://$src_image" \
                   "docker://$target" 2>&1; then
                echo "  ✅ 成功"
                success=$((success + 1))
                echo "| ✅ | \`$src_image\` | \`$target\` |" >> /tmp/results.md
                copied=true
                break
              else
                echo "  ⚠️ 失败"
                if [ $attempt -lt $max_attempts ]; then
                  sleep $((attempt * 10))
                fi
              fi
              attempt=$((attempt + 1))
            done

            if [ "$copied" = false ]; then
              failed=$((failed + 1))
              echo "  ❌ 最终失败"
              echo "| ❌ | \`$src_image\` | \`$target\` |" >> /tmp/results.md
            fi

          done < /tmp/to_sync.txt

          # 输出统计
          echo ""
          echo "════════════════════════════════════════════════════════"
          echo "  总计: $total  |  ✅ 成功: $success  |  ❌ 失败: $failed"
          echo "════════════════════════════════════════════════════════"

          echo "total=$total" >> $GITHUB_OUTPUT
          echo "success=$success" >> $GITHUB_OUTPUT
          echo "failed=$failed" >> $GITHUB_OUTPUT

          if [ $failed -gt 0 ]; then
            exit 1
          fi

      - name: Summary
        if: always() && steps.diff.outputs.skipped != 'true'
        run: |
          {
            echo "## 📦 镜像同步结果"
            echo ""
            echo "| 状态 | 源镜像 | 目标镜像 |"
            echo "|------|--------|----------|"
            if [ -f /tmp/results.md ]; then
              cat /tmp/results.md
            fi
            echo ""
            echo "**总计:** ${{ steps.mirror.outputs.total || 0 }} | **✅ 成功:** ${{ steps.mirror.outputs.success || 0 }} | **❌ 失败:** ${{ steps.mirror.outputs.failed || 0 }}"
          } >> $GITHUB_STEP_SUMMARY
